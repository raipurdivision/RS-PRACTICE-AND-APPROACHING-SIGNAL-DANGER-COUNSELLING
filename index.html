  .header {

  form {

    font-weight: bold;
    padding: 10px 14px;
    margin: 25px 0 15px;
    border-left: 5px solid #003366;
    font-size: 16px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px 25px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
  }
  label {
    font-weight: 600;
    margin-bottom: 5px;
    color: #222;
    font-size: 14px;
  }
  input, select, textarea {
    padding: 8px 10px;
    border: 1px solid #b0b8c1;
    border-radius: 5px;
    font-size: 14px;
    background-color: #d3d3d3;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #003366;
    box-shadow: 0 0 4px rgba(0,51,102,0.3);
  }
  .full-width {
    grid-column: 1 / -1;
  }
  .autocomplete-wrapper {
    position: relative;
  }
  .autocomplete-wrapper input {
    width: 100%;
    box-sizing: border-box;
    background-color: #fff;
  }
  .autocomplete-wrapper input:disabled {
    background-color: #e9ecef;
    color: #777;
    cursor: not-allowed;
  }
  .autocomplete-list {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 200px;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #b0b8c1;
    border-top: none;
    border-radius: 0 0 6px 6px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    z-index: 50;
  }
  .autocomplete-item {
    padding: 8px 10px;
    font-size: 14px;
    cursor: pointer;
  }
  .autocomplete-item:hover,
  .autocomplete-item.active {
    background: #e6eef5;
    color: #003366;
  }
  .submit-row {
    text-align: center;
    margin-top: 30px;
  }
  button {
    background: #003366;
    color: #fff;
    border: none;
    padding: 12px 40px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover {
    background: #00509e;
  }
  @media (max-width: 600px) {

</style>

<script>
const dangerSection = document.getElementById('dangerSection');
const rsSection = document.getElementById('rsSection');
const selector = document.getElementById('section_selector');

function updateSections() {
  const val = selector.value;
  if (val === 'danger') {
    dangerSection.style.display = 'block';
    rsSection.style.display = 'none';
  } else if (val === 'rs') {
    dangerSection.style.display = 'none';
    rsSection.style.display = 'block';
  } else {
    dangerSection.style.display = 'none';
    rsSection.style.display = 'none';
  }
}

selector.addEventListener('change', updateSections);
updateSections(); // run on load to hide both initially

const dsPlace = document.getElementById('ds_place');
const dsLobbyGroup = document.getElementById('ds_lobby_group');
const dsSectionGroup = document.getElementById('ds_section_group');
const dsTrainGroup = document.getElementById('ds_train_group');
const dsLocoGroup = document.getElementById('ds_loco_group');

function updateDsPlace() {
  const val = dsPlace.value;
  if (val === 'Lobby') {
    dsLobbyGroup.style.display = 'flex';
    dsSectionGroup.style.display = 'none';
    dsTrainGroup.style.display = 'none';
    dsLocoGroup.style.display = 'none';
  } else if (val === 'Section') {
    dsLobbyGroup.style.display = 'none';
    dsSectionGroup.style.display = 'flex';
    dsTrainGroup.style.display = 'flex';
    dsLocoGroup.style.display = 'flex';
  } else {
    dsLobbyGroup.style.display = 'none';
    dsSectionGroup.style.display = 'none';
    dsTrainGroup.style.display = 'flex';
    dsLocoGroup.style.display = 'flex';
  }
}

dsPlace.addEventListener('change', updateDsPlace);
updateDsPlace(); // run on load

// ===== CONFIG: Paste your deployed Apps Script Web App URL here =====
const GOOGLE_SHEET_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbytgH6bHWlkN7qLKIc3z_2ZsfdmIuYk_5vzSf4HSgEYuRsjDOmhQw960qJESUGzYCUv/exec";

const submitBtn = document.getElementById('submitBtn');
const submitMessage = document.getElementById('submitMessage');
const submittingMessage = document.getElementById('submittingMessage');
const submitErrorMessage = document.getElementById('submitErrorMessage');

document.getElementById('rbdForm').addEventListener('submit', function(e){
  e.preventDefault();

  // Show "submitting" state immediately and lock the button to prevent double-submit
  submitMessage.style.display = 'none';
  submitErrorMessage.style.display = 'none';
  submittingMessage.style.display = 'block';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';

  const formData = new FormData(this);
  const data = {};
  formData.forEach((value, key) => { data[key] = value; });

  // If "OTHERS" was selected for a name field, submit the manually typed name instead
  if (data['ds_crew_name'] === 'OTHERS' && data['ds_crew_name_other']) {
    data['ds_crew_name'] = data['ds_crew_name_other'].trim();
  }
  if (data['rs_lp_name'] === 'OTHERS' && data['rs_lp_name_other']) {
    data['rs_lp_name'] = data['rs_lp_name_other'].trim();
  }
  if (data['rs_alp_name'] === 'OTHERS' && data['rs_alp_name_other']) {
    data['rs_alp_name'] = data['rs_alp_name_other'].trim();
  }
  delete data['ds_crew_name_other'];
  delete data['rs_lp_name_other'];
  delete data['rs_alp_name_other'];
  const sectionVal = document.getElementById('section_selector').value;
  const sectionLabelMap = { danger: 'APPROACHING DANGER COUNSELLING', rs: 'RS PRACTICE' };
  const sheetNameMap = { danger: 'APPROACHING DANGER COUNSELLING', rs: 'RS PRACTICE' };
  data['section_type'] = sectionLabelMap[sectionVal] || sectionVal;
  data['section_selector'] = sectionLabelMap[sectionVal] || sectionVal;
  data['target_sheet'] = sheetNameMap[sectionVal] || 'Sheet1';
  data['submitted_at'] = new Date().toLocaleString();

  if (GOOGLE_SHEET_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    alert('Google Sheet URL not configured yet. Please set GOOGLE_SHEET_SCRIPT_URL in the script.');
    submittingMessage.style.display = 'none';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
    return;
  }

  fetch(GOOGLE_SHEET_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(() => {
    submittingMessage.style.display = 'none';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
    const msg = document.getElementById('submitMessage');
    msg.style.display = 'block';
    this.reset();
    dsCrewNameOtherGroup.style.display = 'none';
    rsLpNameOtherGroup.style.display = 'none';
    rsAlpNameOtherGroup.style.display = 'none';
    updateSections();
    updateDsPlace();
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  })
  .catch((err) => {
    console.error(err);
    submittingMessage.style.display = 'none';
    submitErrorMessage.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
    setTimeout(() => { submitErrorMessage.style.display = 'none'; }, 5000);
    alert('Error submitting form. Please check your internet connection or script URL.');
  });
});

// ===== CREW DATA: fetched live from Google Sheet (RAIPUR DIVISION CREW) =====
// IMPORTANT: The sheet must be shared as "Anyone with the link - Viewer"
// (Google Sheet > Share) or this will fail to load.
// Uses a JSONP <script> tag (not fetch) so it works even when this HTML
// file is opened directly from disk (file://), where fetch() to an
// external domain gets blocked by the browser's CORS policy.
const CREW_SHEET_ID = '1p-anwng3nFUpeqrOcUlQ5Kv-5B2hyvjyVswgdlOGhlo';
const CREW_SHEET_GID = '0'; // change if crew list lives on a different tab

let CREW_DATA = [];
let crewLoadTimeoutId = null;

function normalizeHeader(h) {
  return (h || '').trim().toLowerCase().replace(/[^a-z0-9]/g, '');
}

function setNameInputState(inputEl, placeholderText, disabled) {
  inputEl.placeholder = placeholderText;
  inputEl.disabled = !!disabled;
  if (disabled) inputEl.value = '';
}

function enableNameInputs() {
  setNameInputState(dsCrewName, 'Type to search crew name...', false);
  setNameInputState(rsLpName, 'Type to search LP name...', false);
  setNameInputState(rsAlpName, 'Type to search ALP name...', false);
}

function showCrewLoadError(reason) {
  console.error('Failed to load LP/ALP/Crew names from Google Sheet:', reason);
  const msg = 'Could not load (' + (reason || 'check sheet sharing') + ')';
  setNameInputState(dsCrewName, msg, true);
  setNameInputState(rsLpName, msg, true);
  setNameInputState(rsAlpName, msg, true);
}

// Called automatically by the JSONP response from Google
function handleCrewSheetResponse(response) {
  clearTimeout(crewLoadTimeoutId);
  try {
    if (!response || response.status === 'error') {
      const detail = response && response.errors && response.errors[0] &&
        (response.errors[0].detailed_message || response.errors[0].message);
      throw new Error(detail || 'Google Sheets returned an error');
    }

    const table = response.table;
    const headers = table.cols.map(c => normalizeHeader(c.label));
    const nameIdx = headers.findIndex(h => ['name', 'crewname', 'lpalpname', 'employeename'].includes(h));
    const desigIdx = headers.findIndex(h => ['designation', 'desig', 'category'].includes(h));
    const hqIdx = headers.findIndex(h => ['hq', 'headquarter', 'headquarters'].includes(h));
    const cmsIdx = headers.findIndex(h => ['cms', 'cmsid', 'crewcmsid'].includes(h));

    if (nameIdx === -1) {
      throw new Error('no "Name" column found - sheet headers were: ' + table.cols.map(c => c.label).join(', '));
    }

    const getCell = (cells, idx) => {
      if (idx < 0) return '';
      const cell = cells[idx];
      return (cell && cell.v != null) ? String(cell.v).trim() : '';
    };

    CREW_DATA = table.rows
      .map(row => {
        const cells = row.c || [];
        return {
          name: getCell(cells, nameIdx),
          designation: getCell(cells, desigIdx).toUpperCase(),
          hq: getCell(cells, hqIdx),
          cms: getCell(cells, cmsIdx)
        };
      })
      .filter(c => c.name);

    enableNameInputs();
  } catch (err) {
    showCrewLoadError(err.message);
  }
}

function loadCrewData() {
  setNameInputState(dsCrewName, 'Loading crew list...', true);
  setNameInputState(rsLpName, 'Loading LP list...', true);
  setNameInputState(rsAlpName, 'Loading ALP list...', true);

  const src = 'https://docs.google.com/spreadsheets/d/' + CREW_SHEET_ID +
    '/gviz/tq?gid=' + CREW_SHEET_GID +
    '&headers=1&tqx=out:json;responseHandler:handleCrewSheetResponse';

  const script = document.createElement('script');
  script.src = src;
  script.onerror = function () {
    showCrewLoadError('could not reach the sheet - is it shared "Anyone with the link"?');
  };
  document.body.appendChild(script);

  // Safety net in case the script loads but never calls our handler
  crewLoadTimeoutId = setTimeout(function () {
    showCrewLoadError('timed out - check sheet sharing settings');
  }, 10000);
}

function getAllCrewNames() {
  const seen = new Set();
  const names = [];
  CREW_DATA.forEach(c => {
    if (c.name && !seen.has(c.name)) { seen.add(c.name); names.push(c.name); }
  });
  return names;
}

function autoFillFromCrew(name, designationField, hqField, cmsField) {
  const crew = CREW_DATA.find(c => c.name === name);
  if (crew) {
    designationField.value = crew.designation;
    hqField.value = crew.hq;
    cmsField.value = crew.cms;
  } else {
    designationField.value = '';
    hqField.value = '';
    cmsField.value = '';
  }
}

function autoFillHqCms(name, hqField, cmsField) {
  const crew = CREW_DATA.find(c => c.name === name);
  if (crew) {
    hqField.value = crew.hq;
    cmsField.value = crew.cms;
  } else {
    hqField.value = '';
    cmsField.value = '';
  }
}

// ===== AUTOCOMPLETE WIDGET (type-to-search behavior for name fields) =====
function setupAutocomplete(inputEl, listEl, getOptions, onSelect) {
  let activeIndex = -1;

  function closeList() {
    listEl.innerHTML = '';
    listEl.style.display = 'none';
    activeIndex = -1;
  }

  function setActive(items) {
    items.forEach((it, i) => it.classList.toggle('active', i === activeIndex));
    if (activeIndex > -1) items[activeIndex].scrollIntoView({ block: 'nearest' });
  }

  function renderMatches(matches) {
    listEl.innerHTML = '';
    activeIndex = -1;
    if (!matches.length) { closeList(); return; }
    matches.forEach(name => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.textContent = name;
      item.addEventListener('mousedown', function (e) {
        e.preventDefault(); // keep focus so blur doesn't close list before click registers
        inputEl.value = name;
        closeList();
        onSelect(name);
      });
      listEl.appendChild(item);
    });
    listEl.style.display = 'block';
  }

  function showMatches() {
    if (inputEl.disabled) return;
    const q = inputEl.value.trim().toLowerCase();
    onSelect(inputEl.value.trim()); // live exact-match autofill as they type/paste
    if (!q) { closeList(); return; }
    const matches = getOptions().filter(n => n.toLowerCase().includes(q)).slice(0, 50);
    if (!matches.includes('OTHERS')) matches.push('OTHERS'); // always offer manual entry alongside matches
    renderMatches(matches);
  }

  inputEl.addEventListener('input', showMatches);
  inputEl.addEventListener('focus', showMatches);

  inputEl.addEventListener('keydown', function (e) {
    const items = listEl.querySelectorAll('.autocomplete-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, items.length - 1);
      setActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      setActive(items);
    } else if (e.key === 'Enter') {
      if (activeIndex > -1) {
        e.preventDefault();
        const name = items[activeIndex].textContent;
        inputEl.value = name;
        closeList();
        onSelect(name);
      }
    } else if (e.key === 'Escape') {
      closeList();
    }
  });

  inputEl.addEventListener('blur', function () {
    setTimeout(closeList, 150); // delay so a click on an item registers first
  });
}

// ----- "OTHERS" manual-entry toggle for name autocomplete fields -----
function toggleOtherNameInput(name, groupEl, otherInputEl) {
  if (name === 'OTHERS') {
    groupEl.style.display = 'flex';
    otherInputEl.focus();
  } else {
    groupEl.style.display = 'none';
    otherInputEl.value = '';
  }
}

// ----- Danger Section -----
const dsCrewName = document.getElementById('ds_crew_name');
const dsCrewNameList = document.getElementById('ds_crew_name_list');
const dsCrewNameOtherGroup = document.getElementById('ds_crew_name_other_group');
const dsCrewNameOther = document.getElementById('ds_crew_name_other');
const dsDesignation = document.getElementById('ds_designation');
const dsCrewCms = document.getElementById('ds_crew_cms');
const dsHq = document.getElementById('ds_hq');

setupAutocomplete(dsCrewName, dsCrewNameList, getAllCrewNames, function (name) {
  toggleOtherNameInput(name, dsCrewNameOtherGroup, dsCrewNameOther);
  autoFillFromCrew(name, dsDesignation, dsHq, dsCrewCms);
});

// ----- RS Section -----
const rsLpName = document.getElementById('rs_lp_name');
const rsLpNameList = document.getElementById('rs_lp_name_list');
const rsLpNameOtherGroup = document.getElementById('rs_lp_name_other_group');
const rsLpNameOther = document.getElementById('rs_lp_name_other');
const rsAlpName = document.getElementById('rs_alp_name');
const rsAlpNameList = document.getElementById('rs_alp_name_list');
const rsAlpNameOtherGroup = document.getElementById('rs_alp_name_other_group');
const rsAlpNameOther = document.getElementById('rs_alp_name_other');
const rsLpHq = document.getElementById('rs_lp_hq');
const rsLpCms = document.getElementById('rs_lp_cms');
const rsAlpHq = document.getElementById('rs_alp_hq');
const rsAlpCms = document.getElementById('rs_alp_cms');

setupAutocomplete(rsLpName, rsLpNameList, getAllCrewNames, function (name) {
  toggleOtherNameInput(name, rsLpNameOtherGroup, rsLpNameOther);
  autoFillHqCms(name, rsLpHq, rsLpCms);
});
setupAutocomplete(rsAlpName, rsAlpNameList, getAllCrewNames, function (name) {
  toggleOtherNameInput(name, rsAlpNameOtherGroup, rsAlpNameOther);
  autoFillHqCms(name, rsAlpHq, rsAlpCms);
});

// Fetch LP / ALP / Crew names live from the Google Sheet
loadCrewData();
</script>
